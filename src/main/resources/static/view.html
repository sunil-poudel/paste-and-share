<!DOCTYPE html>
<html>
<head>
    <title>View Paste</title>
    <style>
        body{
            font-family: Arial;
            margin:40px;
        }

        textarea{
            width:100%;
            height:350px;
            font-family:monospace;
            font-size:14px;
        }

        button{
            margin-top:10px;
            padding:8px 15px;
        }
    </style>
</head>

<body>

<h2>Paste Viewer</h2>

<textarea id="pasteContent" readonly></textarea>

<br>

<button onclick="copyText()">Copy</button>

<p id="views"></p>

<script>

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    async function loadPaste(){

        if(!code){
            document.getElementById("pasteContent").value = "Paste code missing";
            return;
        }

        const response = await fetch("/api/pastes/" + code);
        const data = await response.json();

        console.log(data);   // helps debugging

        document.getElementById("pasteContent").value = data.content || "";
        document.getElementById("views").innerText = "Views: " + (data.views ?? 0);
    }

    function copyText(){
        const text = document.getElementById("pasteContent");

        navigator.clipboard.writeText(text.value)
            .then(() => alert("Copied!"))
            .catch(() => alert("Copy failed"));
    }

    loadPaste();

</script>

</body>
</html>
